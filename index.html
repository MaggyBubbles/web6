<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiple Choice Quiz</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">

</head>
<body>
  <div class="container mt-5">
    <div id="player-input" class="mb-4">

      <!-- Place the player name input here -->

    </div>
    <div id="quiz-container" class="card">
      <div class="card-body">
        <h1 class="card-title text-center">Quiz</h1>

        <!-- Place the question, the options and the results here -->

          <div id="question" class="mb-3"></div>
          <div id="answers" class="d-flex flex-column"></div>
          <div id="feedback" class="mt-3"></div>
      </div>
    </div>
    <div id="leaderboard" class="mt-5">
      <h2>Leaderboard</h2>
        <div id="result"></div>
        <ul id="leaderboard-list"></ul>

      <!-- Place the leaderboard list here -->

    </div>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
